<!DOCTYPE html>
<html>
<head>
    <style>
        /* Basic styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff;
        }
        h1 {
            color: #333;
        }
        p {
            color: #666;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007BFF;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }

        /* Custom styles */
        .header {
            background-color: #007BFF;
            padding: 20px 0;
            text-align: center;
        }
        .header h1 {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Daily Slide Update</h1>
    </div>
    <div class="container">
        <h1>{{ daily_slide.big_title }}</h1>
        <p>{{ daily_slide.sub_title }}</p>
        <p>{{ daily_slide.description }}</p>
        <img src="{{ daily_slide.image_slide }}" alt="Daily Slide Image" style="max-width: 100%;">
        <a href="#" class="button">View Daily Slide</a>
    </div>
</body>
</html>
